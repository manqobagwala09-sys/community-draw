<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Community Draw</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.box{
background:#222;
padding:20px;
border-radius:10px;
max-width:400px;
margin:80px auto;
}

input,button{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
background:green;
color:white;
cursor:pointer;
}

#dashboard{
display:none;
}

.member{
background:#333;
margin:10px;
padding:10px;
border-radius:8px;
text-align:left;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<!-- LOGIN -->
<div class="box" id="loginBox">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Members List</h2>

<div id="list"></div>

<button onclick="loadMembers()">Refresh</button>
<button onclick="logout()">Logout</button>

</div>

<script>

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadMembers();
}else{
alert("Wrong login details");
}
}

function logout(){
document.getElementById("loginBox").style.display="block";
document.getElementById("dashboard").style.display="none";
}

function loadMembers(){
let members = JSON.parse(localStorage.getItem("members")) || [];

let output = "";

members.forEach((m,i)=>{
output += `
<div class="member">
<p><b>Name:</b> ${m.name}</p>
<p><b>Phone:</b> ${m.phone}</p>
<p><b>Plan:</b> ${m.plan}</p>
<p><b>Status:</b> ${m.status}</p>
</div>
`;
});

document.getElementById("list").innerHTML =
output || "No members yet";
}

</script>

</body>
</html>
