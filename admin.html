/* INIT FIREBASE */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD MEMBERS */
async function loadMembers(){

const table = document.getElementById("dataBody");

const snapshot =
await getDocs(collection(db, "members"));

let html = "";

snapshot.forEach((d) => {

const data = d.data();

html += `
<tr>
<td>${data.name || ""}</td>
<td>${data.phone || ""}</td>
<td>${data.plan || ""}</td>
<td>${data.status || "pending"}</td>

<td>
<button class="approve"
onclick="approve('${d.id}')">
Approve
</button>

<button class="reject"
onclick="reject('${d.id}')">
Reject
</button>
</td>
</tr>
`;

});

if(html === ""){
table.innerHTML =
"<tr><td colspan='5'>No members yet</td></tr>";
}else{
table.innerHTML = html;
}

}

await updateDoc(ref, {
status: "approved"
});

loadMembers();

};
