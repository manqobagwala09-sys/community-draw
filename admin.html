<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Community Draw</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#00ff88;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
border:1px solid #333;
padding:10px;
text-align:center;
}

th{
background:#222;
}

tr{
background:#1a1a1a;
}

button{
padding:6px 10px;
margin:2px;
border:none;
cursor:pointer;
border-radius:5px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Plan</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="dataBody">
<tr><td colspan="5">Loading...</td></tr>
</tbody>
</table>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6yW_a7_JXAd4zTLfRBTYNv8q",
  authDomain: "community-draw-161e8.firebaseapp.com",
  projectId: "community-draw-161e8",
  storageBucket: "community-draw-161e8.appspot.com",
  messagingSenderId: "565703571417",
  appId: "1:565703571417:web:0edd18cce17644be6f8bc8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD USERS */
async function loadMembers(){
  const table = document.getElementById("dataBody");
  const snapshot = await getDocs(collection(db, "members"));

  let html = "";

  snapshot.forEach((d) => {
    const data = d.data();

    html += `
      <tr>
        <td>${data.name || ""}</td>
        <td>${data.phone || ""}</td>
        <td>${data.plan || ""}</td>
        <td>${data.status || "pending"}</td>
        <td>
          <button class="approve" onclick="approve('${d.id}')">Approve</button>
          <button class="reject" onclick="reject('${d.id}')">Reject</button>
        </td>
      </tr>
    `;
  });

  if(html === ""){
    table.innerHTML = "<tr><td colspan='5'>No members yet</td></tr>";
  } else {
    table.innerHTML = html;
  }
}

/* APPROVE */
window.approve = async function(id){
  const ref = doc(db, "members", id);
  await updateDoc(ref, { status: "approved" });
  loadMembers();
};

/* REJECT */
window.reject = async function(id){
  const ref = doc(db, "members", id);
  await updateDoc(ref, { status: "rejected" });
  loadMembers();
};

loadMembers();
</script>

</body>
</html>
