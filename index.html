<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Draw</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
header{background:#0a7f39;color:white;text-align:center;padding:20px}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:white;padding:20px;margin-top:15px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.pay{background:#007bff;color:white}
.green{background:#0a7f39;color:white}
li{list-style:none;padding:10px;background:#f7f7f7;margin:5px 0;border-radius:8px}
#winnerBox{font-size:22px;font-weight:bold;color:green;margin-top:10px}
</style>

</head>

<body>

<header>
<h1>🎉 Community Draw</h1>
<p>Pay • Enter • Win</p>
</header>

<div class="container">

<!-- PAYMENT -->
<div class="card">
<h2>💳 Step 1: Pay Entry Fee</h2>

<p>Pay R30 to join the draw</p>

<button class="pay"
onclick="window.open('YOUR_PAYFAST_LINK_HERE','_blank')">
Pay R30 Now
</button>

</div>

<!-- ENTRY -->
<div class="card">
<h2>🎫 Step 2: Enter Name</h2>

<input type="text" id="name" placeholder="Enter your name">

<button class="green" onclick="addUser()">
Join Draw
</button>

</div>

<!-- USERS -->
<div class="card">
<h2>👥 Entries</h2>
<ul id="list"></ul>
</div>

<!-- DRAW -->
<div class="card">
<h2>🏆 Winner</h2>

<button class="green" onclick="pickWinner()">
Pick Winner
</button>

<div id="winnerBox">No winner yet</div>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

function addUser(){

let name = document.getElementById("name").value.trim();

if(name === ""){
alert("Enter name");
return;
}

if(users.includes(name)){
alert("Already entered");
return;
}

users.push(name);
localStorage.setItem("users", JSON.stringify(users));

document.getElementById("name").value="";
render();

}

function render(){

let list = document.getElementById("list");
list.innerHTML="";

users.forEach((u,i)=>{
let li = document.createElement("li");
li.innerText = (i+1)+". "+u;
list.appendChild(li);
});

}

function pickWinner(){

if(users.length === 0){
alert("No entries");
return;
}

let w = users[Math.floor(Math.random()*users.length)];

document.getElementById("winnerBox").innerHTML =
"🏆 WINNER: " + w;

}

render();

</script>

</body>
</html>
