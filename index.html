<header style="background:#0f172a;color:white;padding:30px;text-align:center;">
    <h1>Community Draw</h1>
    <p>Join the community monthly draw and stand a chance to win.</p>
</header>

<section style="padding:20px;">
    <h2>Join the Draw</h2>

    <form id="joinForm">
        <input type="text" id="name" placeholder="Full Name" required><br><br>

        <input type="tel" id="phone" placeholder="Phone Number" required><br><br>

        <input type="email" id="email" placeholder="Email Address"><br><br>

        <button type="submit">Join Now</button>
    </form>

    <p id="msg"></p>
</section>

<section style="padding:20px;background:#f1f5f9;">
    <h2>Latest Winners</h2>

    <ul id="winnerList">
        <li>No winners yet</li>
    </ul>
</section>

<footer style="background:#0f172a;color:white;padding:20px;text-align:center;">
    © 2026 Community Draw
</footer>

<script>
const form = document.getElementById("joinForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;

    document.getElementById("msg").innerHTML =
        "Thank you " + name + ". Your entry was received.";

    form.reset();
});
</script>
