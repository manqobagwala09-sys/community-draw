<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Draw System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>🎉 Community Draw System</h1>
<p>Enter • Participate • Win</p>
</header>

<div class="container">

<div class="card">
<h2>💳 Step 1: Payment</h2>
<button onclick="window.open('YOUR_PAYFAST_LINK_HERE','_blank')" class="btn pay">
Pay R30 Entry
</button>
</div>

<div class="card">
<h2>🎫 Step 2: Join Draw</h2>

<input id="name" placeholder="Enter your name">
<input id="ref" placeholder="Referral code (optional)">

<button onclick="joinDraw()" class="btn green">
Join Draw
</button>

<p id="ticketInfo"></p>
</div>

<div class="card">
<h2>👥 Entries</h2>
<ul id="userList"></ul>
</div>

<div class="card">
<h2>🏆 Winner</h2>
<button onclick="pickWinner()" class="btn green">
Pick Winner
</button>

<div id="winnerBox">No winner yet</div>
</div>

<div class="card">
<h2>📲 Share System</h2>
<button onclick="share()" class="btn whatsapp">
Share on WhatsApp
</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
