<!DOCTYPE html>
<html>
<head>
<title>Community Draw SA</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4;}

header{
background:#008000;
color:white;
text-align:center;
padding:20px;
}

.section{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.plan{
border:2px solid #008000;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
background:#008000;
color:white;
padding:10px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Community Draw SA</h1>
<p>Membership System</p>
</header>

<div class="section">
<h2>Membership Plans</h2>

<div class="plan">
<h3>Basic</h3>
<p>R30 / Month</p>
<button onclick="openForm('Basic')">Join</button>
</div>

<div class="plan">
<h3>Silver</h3>
<p>R50 / 3 Months</p>
<button onclick="openForm('Silver')">Join</button>
</div>

<div class="plan">
<h3>Premium</h3>
<p>R100 / 6 Months</p>
<button onclick="openForm('Premium')">Join</button>
</div>

</div>

<div class="section">
<h2>Today Winner</h2>
<p>No winner yet</p>
</div>

<!-- FORM -->
<div id="formBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;">

<div style="background:white;width:90%;max-width:400px;margin:100px auto;padding:20px;border-radius:10px;">

<h3 id="title">Join</h3>

<input id="name" placeholder="Name" style="width:100%;padding:10px;margin:5px;"><br>
<input id="phone" placeholder="Phone" style="width:100%;padding:10px;margin:5px;"><br>

<button onclick="save()">Submit</button>
<button onclick="closeForm()">Close</button>

</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6yW_a7_JXAd4zTLfRBTYNv8q",
  authDomain: "community-draw-161e8.firebaseapp.com",
  projectId: "community-draw-161e8",
  storageBucket: "community-draw-161e8.appspot.com",
  messagingSenderId: "565703571417",
  appId: "1:565703571417:web:0edd18cce17644be6f8bc8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let plan = "";

window.openForm = function(p){
  plan = p;
  document.getElementById("title").innerText = "Join " + p;
  document.getElementById("formBox").style.display = "block";
};

window.closeForm = function(){
  document.getElementById("formBox").style.display = "none";
};

window.save = async function(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(!name || !phone){
    alert("Fill all fields");
    return;
  }

  try {
    await addDoc(collection(db, "members"), {
      name: name,
      phone: phone,
      plan: plan,
      status: "pending",
      time: new Date()
    });

    alert("Successfully joined!");
    closeForm();
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
  </html>
